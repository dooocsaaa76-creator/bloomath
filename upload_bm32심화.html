function uid(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = Math.imul(31, h) + s.charCodeAt(i) | 0; }
  return 'id_' + Math.abs(h).toString(36).padStart(8,'0');
}

function buildMsg(date, progress, homework, name, comment) {
  let msg = `${date} 진도 및 과제 안내\n\n`;
  if (progress) msg += `■ 진도 : ${progress}\n`;
  if (homework && homework !== 'X') msg += `■ 과제 : ${homework}\n`;
  msg += `\n오늘 ${name}학생의 Bloomath는? \n`;
  msg += comment;
  return msg.trim();
}

const STUDENT_NAMES = ["유하린","장예온","박서원","박서윤","이태윤","김태완","신지원","황제다"];
const NEW_QUARTER_NAME = "3월분기";
const NEW_CLASS_NAME = "BM3-2심화";
const NEW_QUARTER_ID = uid(NEW_QUARTER_NAME);
const NEW_CLASS_ID = uid(NEW_CLASS_NAME + "_bm32");  // BM4-1심화와 구분

const students = STUDENT_NAMES.map(name => ({
  id: uid(name + "_bm32"), name, school: "", grade: "", class1: "", class2: "", comment: ""
}));

const messages = ALL_DATA.map(([date, prog, hw, name, comment], i) => ({
  id: uid(date + name + "_bm32_" + i),
  date, progress: prog, homework: hw === 'X' ? '' : hw,
  studentId: uid(name + "_bm32"), studentName: name, comment,
  text: buildMsg(date, prog, hw, name, comment),
  createdAt: 1741219200000 + i * 60000
}));

const newClassObj = {
  id: NEW_CLASS_ID,
  name: NEW_CLASS_NAME,
  date: "", progress: "", homework: "",
  students, messages
};

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.classList.add('show');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.startUpload = async function() {
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 업로드 중...';

  log(`<span class="info">📡 Firebase에서 기존 데이터 불러오는 중...</span>`);

  try {
    const dbDoc = doc(db, 'bloomath', 'main');
    const snap = await getDoc(dbDoc);
    let existingData = { quarters: [] };
    if (snap.exists()) {
      existingData = snap.data();
      log(`<span class="ok">✅ 기존 데이터 확인: 분기 ${existingData.quarters.length}개</span>`);
    } else {
      log(`<span class="warn">⚠️ 기존 데이터 없음 → 새로 생성</span>`);
    }

    // 3월분기 찾기
    let targetQuarter = existingData.quarters.find(q => q.id === NEW_QUARTER_ID);
    if (targetQuarter) {
      log(`<span class="info">📂 '${NEW_QUARTER_NAME}' 분기 발견 → 반 추가</span>`);
      // 이미 같은 반이 있으면 스킵
      const existingClass = targetQuarter.classes.find(c => c.id === NEW_CLASS_ID);
      if (existingClass) {
        log(`<span class="warn">⚠️ '${NEW_CLASS_NAME}' 반이 이미 존재합니다. 덮어쓰기합니다.</span>`);
        const idx = targetQuarter.classes.findIndex(c => c.id === NEW_CLASS_ID);
        targetQuarter.classes[idx] = newClassObj;
      } else {
        targetQuarter.classes.push(newClassObj);
        log(`<span class="ok">✅ '${NEW_CLASS_NAME}' 반 추가 완료</span>`);
      }
    } else {
      log(`<span class="info">📂 '${NEW_QUARTER_NAME}' 분기 없음 → 새로 생성</span>`);
      existingData.quarters.push({
        id: NEW_QUARTER_ID,
        name: NEW_QUARTER_NAME,
        classes: [newClassObj]
      });
    }

    log(`<span class="info">💾 Firebase에 저장 중... (학생 ${students.length}명, 발송기록 ${messages.length}건)</span>`);
    await setDoc(dbDoc, existingData);
    log(`<span class="ok">✅ 저장 완료! 기존 데이터 유지 + BM3-2심화 반 추가됨</span>`);
    document.getElementById('done').classList.add('show');
    btn.textContent = '✅ 완료';
  } catch(e) {
    log(`<span class="err">❌ 오류: ${e.message}</span>`);
    btn.disabled = false;
    btn.textContent = '🔄 다시 시도';
  }
};
