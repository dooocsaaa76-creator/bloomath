function uid(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = Math.imul(31, h) + s.charCodeAt(i) | 0; }
  return 'id_' + Math.abs(h).toString(36).padStart(8,'0');
}

function buildMsg(date, progress, homework, name, comment) {
  let msg = `${date} 진도 및 과제 안내\n\n`;
  msg += `■ 진도 : ${progress}\n`;
  msg += `■ 과제 : ${homework}\n\n`;
  msg += `오늘 ${name}학생의 Bloomath는? \n`;
  msg += comment;
  return msg.trim();
}

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.classList.add('show');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.startUpload = async function() {
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 업로드 중...';

  log(`<span class="info">📊 업로드 데이터 준비 중...</span>`);
  log(`• 분기: 3월분기`);
  log(`• 반: BM4-1심화`);
  log(`• 학생: ${students.length}명 (${STUDENT_NAMES.join(', ')})`);
  log(`• 발송 기록: ${messages.length}건 (3/4~3/25)`);
  log(`<span class="info">🔥 Firebase에 저장 중...</span>`);

  try {
    const dbDoc = doc(db, 'bloomath', 'main');
    await setDoc(dbDoc, DATA);
    log(`<span class="ok">✅ 업로드 완료! ${messages.length}건의 발송 기록이 저장되었습니다.</span>`);
    document.getElementById('done').classList.add('show');
    btn.textContent = '✅ 완료';
  } catch(e) {
    log(`<span class="err">❌ 오류: ${e.message}</span>`);
    btn.disabled = false;
    btn.textContent = '🔄 다시 시도';
  }
};
