function uid(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return 'id_' + Math.abs(h).toString(36).padStart(8,'0');
}

function buildMsg(date, progress, homework, name, comment) {
  let msg = `${date} 진도 및 과제 안내\n\n`;
  if (progress) msg += `■ 진도 : ${progress}\n`;
  if (homework && homework !== 'X') msg += `■ 과제 : ${homework}\n`;
  msg += `\n오늘 ${name}학생의 Bloomath는? \n`;
  msg += comment;
  return msg.trim();
}

function makeStudents(names, tag) {
  return names.map(name => ({ id: uid(name+tag), name, school:'', grade:'', class1:'', class2:'', comment:'' }));
}

function makeMessages(rows, tag, baseTs) {
  return rows.filter(r => r[3] && r[4]).map(([date, prog, hw, name, comment], i) => ({
    id: uid(date+name+tag+i),
    date, progress: prog || '', homework: (hw && hw !== 'X') ? hw : '',
    studentId: uid(name+tag), studentName: name, comment,
    text: buildMsg(date, prog, hw, name, comment),
    createdAt: baseTs + i * 60000
  }));
}

  { id: uid('BM4-2기본_jun'), name: 'BM4-2기본', students: makeStudents(BM42_NAMES, BM42_TAG), messages: makeMessages(BM42_DATA, BM42_TAG, 1748908800000) },

].map(c => ({ ...c, date:'', progress:'', homework:'' }));

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.classList.add('show');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.startUpload = async function() {
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 업로드 중...';

  log(`<span class="info">📡 Firebase에서 기존 데이터 확인 중...</span>`);

  try {
    const dbDoc = doc(db, 'bloomath', 'main');
    const snap = await getDoc(dbDoc);
    let data = { quarters: [] };
    if (snap.exists()) {
      data = snap.data();
      log(`<span class="ok">✅ 기존 데이터: 분기 ${data.quarters.length}개</span>`);
    } else {
      log(`<span class="warn">⚠️ 기존 데이터 없음 → 새로 생성</span>`);
    }

    let targetQ = data.quarters.find(q => q.id === QUARTER_ID);
    if (targetQ) {
      log(`<span class="info">📂 '${QUARTER_NAME}' 분기 발견 → 반 추가/갱신</span>`);
    } else {
      log(`<span class="info">📂 '${QUARTER_NAME}' 분기 없음 → 새로 생성</span>`);
      targetQ = { id: QUARTER_ID, name: QUARTER_NAME, classes: [] };
      data.quarters.push(targetQ);
    }

    for (const cls of NEW_CLASSES) {
      const existIdx = targetQ.classes.findIndex(c => c.id === cls.id);
      if (existIdx >= 0) {
        targetQ.classes[existIdx] = cls;
        log(`<span class="warn">🔄 '${cls.name}' 반 갱신 (학생 ${cls.students.length}명, 발송 ${cls.messages.length}건)</span>`);
      } else {
        targetQ.classes.push(cls);
        log(`<span class="ok">✅ '${cls.name}' 반 추가 (학생 ${cls.students.length}명, 발송 ${cls.messages.length}건)</span>`);
      }
    }

    const total = NEW_CLASSES.reduce((s,c) => s + c.messages.length, 0);
    log(`<span class="info">💾 Firebase에 저장 중... (총 발송기록 ${total}건)</span>`);
    await setDoc(dbDoc, data);
    log(`<span class="ok">✅ 저장 완료! 기존 데이터 유지 + 6월분기 3개 반 추가됨</span>`);
    document.getElementById('done').classList.add('show');
    btn.textContent = '✅ 완료';
  } catch(e) {
    log(`<span class="err">❌ 오류: ${e.message}</span>`);
    btn.disabled = false;
    btn.textContent = '🔄 다시 시도';
  }
};
