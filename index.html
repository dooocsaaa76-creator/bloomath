<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS서초영재관 문자 시트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #F7F8FC;
    --surface: #FFFFFF;
    --surface2: #F0F2FA;
    --primary: #4361EE;
    --primary-dark: #3451d1;
    --primary-light: #EEF1FD;
    --accent: #F72585;
    --text: #1A1D2E;
    --text-secondary: #6B7280;
    --border: #E5E8F0;
    --success: #10B981;
    --success-light: #ECFDF5;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(67,97,238,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 18px;
    color: var(--primary);
    cursor: pointer;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-badge {
    font-size: 12px;
    background: var(--primary-light);
    color: var(--primary);
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .save-indicator {
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .save-indicator .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
  }

  /* BREADCRUMB */
  .breadcrumb {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 24px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    flex-wrap: wrap;
  }
  .breadcrumb span.crumb {
    cursor: pointer;
  }
  .breadcrumb span.crumb:hover { color: var(--primary); text-decoration: underline; }
  .breadcrumb span.current { color: var(--text); font-weight: 600; }
  .breadcrumb .sep { color: var(--border); }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 24px 40px;
  }

  /* PAGE TITLE */
  .page-title-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .page-title {
    font-size: 24px;
    font-weight: 900;
  }
  .page-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* TOOLBAR (생성 버튼 영역) */
  .toolbar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .toolbar label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-right: 2px;
  }

  select, input[type="text"], input[type="month"], textarea {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  select:focus, input:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(67,97,238,0.12);
  }

  input[type="text"], textarea { width: 100%; resize: vertical; }
  textarea { min-height: 90px; line-height: 1.6; }

  /* ROSTER (학생 명단) */
  .roster-form {
    display: grid;
    grid-template-columns: 1.4fr 1.4fr 0.8fr 1fr 1fr auto;
    gap: 8px;
    align-items: center;
  }
  .roster-input { width: 100%; }
  .roster-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
  .roster-table th {
    text-align: left;
    padding: 9px 10px;
    background: var(--surface2);
    font-size: 11.5px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    border-bottom: 1.5px solid var(--border);
  }
  .roster-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
  }
  .roster-table tr.selected-row { background: var(--primary-light); }
  @media (max-width: 900px) {
    .roster-form { grid-template-columns: 1fr 1fr; }
  }

  /* BOX GRID (분기 박스 / 반 박스) */
  .box-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }

  .entity-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 18px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .entity-box:hover {
    border-color: var(--primary);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(67,97,238,0.18);
  }
  .entity-box .emoji {
    font-size: 28px;
    margin-bottom: 10px;
  }
  .entity-box .name {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .entity-box .meta {
    font-size: 11.5px;
    color: var(--text-secondary);
  }
  .entity-box .del-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: var(--surface2);
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .entity-box:hover .del-btn { display: flex; }
  .entity-box .del-btn:hover { background: #FEE2E2; color: #EF4444; }

  /* 담임명 */
  .teacher-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #FFF3E0;
    color: #F59E0B;
    border: 1px solid #FDE68A;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .teacher-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 0;
  }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-secondary);
    font-size: 13.5px;
  }
  .empty-state .big-emoji { font-size: 40px; margin-bottom: 12px; }

  /* CARDS (입력화면) */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .icon-common { background: var(--primary-light); }
  .icon-individual { background: #FFF3E0; }
  .icon-result { background: var(--success-light); }
  .icon-students { background: #F3E8FF; }

  .card-title { font-size: 14px; font-weight: 600; }
  .card-subtitle { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .card-body { padding: 20px; }

  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* STUDENT TABS */
  .student-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }

  .tab-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-secondary);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .tab-btn:hover { border-color: var(--primary); color: var(--primary); }
  .tab-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .tab-btn.add-btn { border-style: dashed; color: var(--primary); border-color: var(--primary); }
  .tab-btn.add-btn:hover { background: var(--primary-light); }

  /* RESULT BOX */
  .result-box {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 13.5px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-all;
    min-height: 200px;
    max-height: 420px;
    overflow-y: auto;
  }
  .result-placeholder { color: var(--text-secondary); font-style: italic; font-size: 13px; }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(67,97,238,0.3); }
  .btn-outline { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #059669; transform: translateY(-1px); }
  .btn-danger { background: #FEF2F2; color: #EF4444; border: 1.5px solid #FEE2E2; }
  .btn-danger:hover { background: #FEE2E2; }
  .btn-stat { background: linear-gradient(135deg,#7C3AED,#A855F7); color: #fff; }
  .btn-stat:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,58,237,0.35); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

  /* STUDENT LIST PANEL (with 날짜/이름/전체 columns) */
  .msg-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .msg-table th {
    text-align: left;
    padding: 10px 12px;
    background: var(--surface2);
    font-size: 11.5px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    border-bottom: 1.5px solid var(--border);
  }
  .msg-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .msg-table tr.clickable { cursor: pointer; transition: background 0.15s; }
  .msg-table tr.clickable:hover { background: var(--primary-light); }
  .msg-table .col-date { width: 90px; font-weight: 600; white-space: nowrap; }
  .msg-table .col-name { width: 100px; font-weight: 600; }
  .msg-table .col-full {
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 1px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: #fff;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  .char-count { text-align: right; font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
  .char-count.over { color: var(--accent); font-weight: 600; }

  @keyframes highlight { 0% { background: #FFFDE7; } 100% { background: var(--surface2); } }
  .result-box.updated { animation: highlight 1s ease; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,18,35,0.55);
    z-index: 500;
    overflow-y: auto;
    padding: 40px 20px;
  }
  .modal-box {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header .title { font-weight: 700; font-size: 16px; }
  .modal-close { border: none; background: none; font-size: 20px; cursor: pointer; color: #999; line-height:1; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

  /* STATS */
  .stat-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
  }
  .stat-card .num { font-size: 26px; font-weight: 900; color: var(--primary); }
  .stat-card .lbl { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  .stat-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .stat-section-header {
    padding: 14px 20px;
    background: var(--surface2);
    font-weight: 700;
    font-size: 13.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-section-body { padding: 8px 0; }

  .stat-row {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-row:hover { background: var(--primary-light); }
  .stat-row .left { display:flex; align-items:center; gap:10px; }
  .stat-row .badge {
    font-size: 11px;
    background: var(--primary-light);
    color: var(--primary);
    padding: 3px 9px;
    border-radius: 12px;
    font-weight: 600;
  }
  .stat-row .count { font-size: 12px; color: var(--text-secondary); }
  .stat-row .name-text { font-weight: 600; font-size: 13.5px; }
  .stat-row .sub-text { font-size: 11.5px; color: var(--text-secondary); margin-top:2px; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    header { padding: 0 16px; }
    .container { padding: 16px; }
    .breadcrumb { padding: 12px 16px 0; }
    .msg-table .col-full { display: none; }
  }

  /* ── PL 전용 CSS ── */
  .main-menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 700px;
    margin: 60px auto 0;
  }
  .main-menu-card {
    background: var(--surface);
    border-radius: 18px;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
    padding: 40px 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .main-menu-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(67,97,238,0.18); border-color: var(--primary); }
  .main-menu-card .icon { font-size: 48px; margin-bottom: 16px; }
  .main-menu-card .title { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
  .main-menu-card .desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
  .main-menu-card.pl { border-color: #F59E0B; }
  .main-menu-card.pl:hover { box-shadow: 0 12px 28px rgba(245,158,11,0.2); }

  /* PL 반 탭 */
  .pl-venue-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .pl-venue-tab {
    padding: 8px 20px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--surface); font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; color: var(--text-secondary); font-family: inherit;
  }
  .pl-venue-tab.active { background: #F59E0B; border-color: #F59E0B; color: #fff; }
  .pl-venue-tab:hover:not(.active) { border-color: #F59E0B; color: #F59E0B; }

  .pl-class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; margin-bottom: 28px; }
  .pl-class-btn {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 12px 10px; text-align: center; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .pl-class-btn:hover { border-color: #F59E0B; }
  .pl-class-btn.active { background: #FFF8E6; border-color: #F59E0B; }
  .pl-class-btn .cls-name { font-weight: 700; font-size: 13.5px; }
  .pl-class-btn .cls-time { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
  .pl-class-btn .cls-count { font-size: 11px; color: #F59E0B; font-weight: 600; margin-top: 2px; }

  /* PL 학생 목록 */
  .pl-student-list { display: flex; flex-direction: column; gap: 8px; }
  .pl-student-row {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s;
  }
  .pl-student-row:hover { border-color: #F59E0B; background: #FFF8E6; }
  .pl-student-row.active { border-color: #F59E0B; background: #FFF8E6; }
  .pl-student-row.sent { background: #F0FFF4; border-color: #10B981; }
  .pl-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink:0; }
  .pl-check.done { background: #10B981; border-color: #10B981; color: #fff; }
  .pl-student-name { font-weight: 700; font-size: 14px; flex: 1; }
  .pl-student-meta { font-size: 11.5px; color: var(--text-secondary); }
  .pl-student-badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .pl-badge { font-size: 10.5px; background: #FFF3E0; color: #F59E0B; border: 1px solid #FDE68A;
    padding: 2px 7px; border-radius: 8px; font-weight: 600; }
  .pl-badge.course { background: var(--primary-light); color: var(--primary); border-color: #C7D2FE; }

  /* PL 문자 입력 패널 */
  .pl-layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
  @media (max-width: 900px) { .pl-layout { grid-template-columns: 1fr; } }

  .pl-result-box {
    background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px;
    padding: 14px; font-size: 13.5px; line-height: 1.75; white-space: pre-wrap;
    word-break: break-all; min-height: 180px; max-height: 380px; overflow-y: auto;
  }

  /* PL 학생 명단 */
  .pl-roster-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .pl-roster-table th { background: var(--surface2); padding: 9px 12px; text-align:left;
    font-size: 11.5px; color: var(--text-secondary); border-bottom: 1.5px solid var(--border); }
  .pl-roster-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .pl-roster-table tr:hover td { background: #FFF8E6; }
  .pl-roster-table tr.clickable { cursor: pointer; }

  /* 오렌지 계열 버튼 */
  .btn-pl { background: #F59E0B; color: #fff; }
  .btn-pl:hover { background: #D97706; transform: translateY(-1px); }
  .btn-pl-outline { background: var(--surface); color: #F59E0B; border: 1.5px solid #F59E0B; }
  .btn-pl-outline:hover { background: #FFF8E6; }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">
    <div class="logo-dot"></div>
    CMS서초영재관
  </div>
  <div class="header-right">
    <span class="save-indicator"><span class="dot"></span>자동 저장됨</span>
    <button class="btn btn-stat btn-sm" id="statsBtn" onclick="openStats()" style="display:none;">📊 통계</button>
    <button class="btn btn-pl btn-sm" id="plRosterBtn" onclick="window.plGo('roster')" style="display:none;">👥 전체 명단</button>
  </div>
</header>

<div class="breadcrumb" id="breadcrumb"></div>

<div id="loadingScreen" style="max-width:1200px;margin:0 auto;padding:80px 24px;text-align:center;">
  <div style="font-size:40px;margin-bottom:16px;">🔄</div>
  <div style="font-size:15px;font-weight:600;color:var(--primary);margin-bottom:8px;">Firebase에 연결 중...</div>
  <div style="font-size:13px;color:var(--text-secondary);">데이터를 불러오고 있습니다</div>
</div>

<div class="container" id="app" style="display:none;"></div>

<div class="toast" id="toast"></div>

<!-- 학생 문자 미리보기 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="title" id="modalTitle">미리보기</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalContent"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- 통계 모달 -->
<div class="modal-overlay" id="statsModal">
  <div class="modal-box" style="max-width:820px;">
    <div class="modal-header">
      <span class="title">📊 전체 통계</span>
      <button class="modal-close" onclick="closeStats()">✕</button>
    </div>
    <div class="modal-body" id="statsContent" style="max-height:75vh;overflow-y:auto;"></div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box" style="max-width:380px;">
    <div class="modal-header">
      <span class="title">⚠️ 삭제 확인</span>
      <button class="modal-close" onclick="closeConfirm()">✕</button>
    </div>
    <div class="modal-body">
      <p id="confirmMessage" style="font-size:13.5px;line-height:1.6;color:var(--text);"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="confirmDeleteBtn">삭제</button>
      <button class="btn btn-outline" onclick="closeConfirm()">취소</button>
    </div>
  </div>
</div>

<script type="module">
/* ===========================================================
   Firebase Firestore 실시간 연동 버전
   - localStorage 완전 제거 → Firestore 저장/실시간 동기화
   - 문서 구조: /bloomath/{docId} → {quarters: [...]}
=========================================================== */

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getFirestore, doc, setDoc, onSnapshot
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyB5kXJJ4pQtU5i6sqE3RXOUu2DiHRg87WA",
  authDomain: "bloomath-message.firebaseapp.com",
  projectId: "bloomath-message",
  storageBucket: "bloomath-message.firebasestorage.app",
  messagingSenderId: "968918734392",
  appId: "1:968918734392:web:2bc5c4df537eaaf64bb8cd"
};

const firebaseApp = initializeApp(firebaseConfig);
const firestore = getFirestore(firebaseApp);
const DB_DOC  = doc(firestore, 'bloomath', 'main');   // Bloomath 반별수업
const PL_DOC  = doc(firestore, 'bloomath', 'pl');     // PL 개별진도반

const CLASS_OPTIONS = ['BM3-1기본','BM3-1심화','BM3-2기본','BM3-2심화','BM4-1기본','BM4-1심화','BM4-2기본'];

let db = { quarters: [] };
let view = { page: 'home', quarterId: null, classId: null };
let currentStudentIdx = 0;
let studentMgmtOpen = false;
let isSaving = false;  // 자기 자신의 저장 중엔 snapshot 무시
let isInitialized = false;

/* ===========================================================
   FIRESTORE 저장 / 실시간 수신
=========================================================== */

async function saveDB() {
  isSaving = true;
  try {
    await setDoc(DB_DOC, { quarters: db.quarters });
    flashSaveIndicator('saved');
  } catch(e) {
    console.error('저장 오류:', e);
    flashSaveIndicator('error');
  }
  setTimeout(() => { isSaving = false; }, 800);
}

function startRealtimeSync() {
  onSnapshot(DB_DOC, (snap) => {
    if (isSaving) return;  // 내가 저장한 직후 반영은 무시
    if (snap.exists()) {
      const remote = snap.data();
      db = { quarters: remote.quarters || [] };
    } else {
      db = { quarters: [] };
    }
    if (!isInitialized) {
      isInitialized = true;
      hideLoading();
      view = { page: 'main' };
      render();
    } else {
      // 다른 사람이 수정했을 때 현재 페이지만 부드럽게 갱신
      silentRefresh();
    }
  }, (err) => {
    console.error('실시간 동기화 오류:', err);
    showToast('⚠️ 동기화 오류: ' + err.message);
  });
}

function silentRefresh() {
  // 현재 페이지 상태를 유지하면서 데이터만 갱신
  if (view.page === 'home') {
    document.getElementById('app').innerHTML = renderHome();
    showSyncBadge();
  } else if (view.page === 'quarter') {
    document.getElementById('app').innerHTML = renderQuarterPage();
    showSyncBadge();
  } else if (view.page === 'class') {
    // 입력 중인 필드 값 보존
    const dateVal = document.getElementById('date')?.value;
    const progressVal = document.getElementById('progress')?.value;
    const homeworkVal = document.getElementById('homework')?.value;
    const commentVal = document.getElementById('comment')?.value;

    // 명단/목록 영역만 갱신 (입력 필드는 그대로)
    const c = getClass(view.quarterId, view.classId);
    if (c) {
      renderRosterList();
      renderTabs();
      renderMessageList();
      showSyncBadge();
    }
  }
}

function showSyncBadge() {
  const el = document.querySelector('.save-indicator');
  if (!el) return;
  el.innerHTML = '<span class="dot" style="background:var(--primary)"></span>다른 사용자가 업데이트했습니다';
  setTimeout(() => {
    el.innerHTML = '<span class="dot"></span>자동 저장됨';
  }, 3000);
}

function flashSaveIndicator(state) {
  const el = document.querySelector('.save-indicator');
  if (!el) return;
  if (state === 'saved') {
    el.innerHTML = '<span class="dot"></span>저장됨';
    el.style.color = 'var(--success)';
    setTimeout(() => {
      el.innerHTML = '<span class="dot"></span>자동 저장됨';
      el.style.color = 'var(--text-secondary)';
    }, 1000);
  } else if (state === 'saving') {
    el.innerHTML = '<span class="dot" style="background:#f59e0b"></span>저장 중...';
  } else if (state === 'error') {
    el.innerHTML = '<span class="dot" style="background:#ef4444"></span>저장 실패';
    el.style.color = '#ef4444';
  }
}

function hideLoading() {
  const el = document.getElementById('loadingScreen');
  if (el) el.style.display = 'none';
  const app = document.getElementById('app');
  if (app) app.style.display = '';
}

function uid() { return 'id_' + Math.random().toString(36).slice(2,10); }

function getQuarter(qid) { return db.quarters.find(q => q.id === qid); }
function getClass(qid, cid) {
  const q = getQuarter(qid);
  if (!q) return null;
  return q.classes.find(c => c.id === cid);
}

/* ===========================================================
   ROUTER / RENDER
=========================================================== */

function render() {
  if (!view || !view.page) return;
  renderBreadcrumb();
  const app = document.getElementById('app');
  if (!app) return;

  // 헤더 버튼 가시성 제어
  const statsBtn = document.getElementById('statsBtn');
  const plRosterBtn = document.getElementById('plRosterBtn');
  const isBloomath = ['home','quarter','class'].includes(view.page);
  const isPL = view.page && view.page.startsWith('pl');
  if (statsBtn) statsBtn.style.display = isBloomath ? '' : 'none';
  if (plRosterBtn) plRosterBtn.style.display = isPL ? '' : 'none';

  if (view.page === 'main') app.innerHTML = renderMainHub();
  else if (view.page === 'home') app.innerHTML = renderHome();
  else if (view.page === 'quarter') app.innerHTML = renderQuarterPage();
  else if (view.page === 'class') { app.innerHTML = renderClassPage(); initClassPage(); }
  else if (view.page === 'pl-home') app.innerHTML = renderPLHome();
  else if (view.page === 'pl-terms') app.innerHTML = renderPLTerms();
  else if (view.page === 'pl-class') { app.innerHTML = renderPLClassPage(); initPLClassPage(); }
  else if (view.page === 'pl-roster') app.innerHTML = renderPLRoster();
  else if (view.page === 'pl-student') app.innerHTML = renderPLStudentPage();
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = `<span class="crumb" onclick="window._go('main')">🏠 홈</span>`;

  if (['home','quarter','class'].includes(view.page)) {
    html += `<span class="sep">›</span><span class="crumb" onclick="window._go('home')">Bloomath</span>`;
    if (view.page === 'quarter' || view.page === 'class') {
      const q = getQuarter(view.quarterId);
      html += `<span class="sep">›</span>`;
      if (view.page === 'quarter') html += `<span class="current">${q ? q.name : ''}</span>`;
      else html += `<span class="crumb" onclick="window._go('quarter','${view.quarterId}')">${q ? q.name : ''}</span>`;
    }
    if (view.page === 'class') {
      const c = getClass(view.quarterId, view.classId);
      html += `<span class="sep">›</span><span class="current">${c ? c.name : ''}</span>`;
    }
  } else if (view.page.startsWith('pl')) {
    html += `<span class="sep">›</span><span class="crumb" onclick="window.plGo('home')">PL 개별진도반</span>`;
    if (view.page === 'pl-terms') {
      const t = getPLTerm(view.plTermId);
      html += `<span class="sep">›</span><span class="current">${t ? t.name : ''}</span>`;
    } else if (view.page === 'pl-class') {
      const t = getPLTerm(view.plTermId);
      const cls = getPLClassDef(view.plTermId, view.plClassId);
      if (t) html += `<span class="sep">›</span><span class="crumb" onclick="window.plGo('terms','${view.plTermId}')">${t.name}</span>`;
      html += `<span class="sep">›</span><span class="current">${cls ? cls.name : ''}</span>`;
    } else if (view.page === 'pl-roster') {
      html += `<span class="sep">›</span><span class="current">전체 학생 명단</span>`;
    } else if (view.page === 'pl-student') {
      html += `<span class="sep">›</span><span class="current">${view.plStudentName || ''}</span>`;
    }
  }
  bc.innerHTML = html;
}

// 메인 허브
function renderMainHub() {
  return `
    <div style="text-align:center;padding:40px 0 20px;">
      <div style="font-size:28px;font-weight:900;color:var(--primary);margin-bottom:8px;">CMS서초영재관 선생님 포털</div>
      <div style="font-size:14px;color:var(--text-secondary);">수업 방식을 선택해주세요</div>
    </div>
    <div class="main-menu-grid">
      <div class="main-menu-card" onclick="window._go('home')">
        <div class="icon">📚</div>
        <div class="title" style="color:var(--primary);">Bloomath</div>
        <div class="desc">반별 수업<br>진도 · 과제 · 문자 발송</div>
      </div>
      <div class="main-menu-card pl" onclick="window.plGo('home')">
        <div class="icon">⭐</div>
        <div class="title" style="color:#F59E0B;">PL 개별진도반</div>
        <div class="desc">학생별 개인 진도<br>L-Class · 가정학습 · 문자 발송</div>
      </div>
    </div>
  `;
}

window._go = function(page, qid, cid) {
  if (page === 'main') { view = { page:'main' }; render(); }
  else if (page === 'home') { view = { page:'home', quarterId:null, classId:null }; render(); }
  else if (page === 'quarter') { view = { page:'quarter', quarterId:qid, classId:null }; render(); }
  else if (page === 'class') { view = { page:'class', quarterId:qid, classId:cid }; currentStudentIdx = 0; studentMgmtOpen = false; render(); }
};

window.goHome = () => window._go('main');
window.goQuarter = (qid) => window._go('quarter', qid);
window.goClass = (qid, cid) => window._go('class', qid, cid);

/* ===========================================================
   HOME PAGE
=========================================================== */

function renderHome() {
  const now = new Date();
  const currentYear = now.getFullYear();
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const currentMonthIdx = now.getMonth(); // 0-indexed

  // 최신 분기가 위로 (추가된 역순)
  const boxes = [...db.quarters].reverse().map(q => `
    <div class="entity-box" onclick="window._go('quarter','${q.id}')">
      <button class="del-btn" onclick="event.stopPropagation(); window.deleteQuarter('${q.id}')">✕</button>
      <div class="emoji">🗂️</div>
      <div class="name">${q.name}</div>
      <div class="meta">${q.classes.length}개 반</div>
    </div>
  `).join('');

  return `
    <div class="page-title-row">
      <div>
        <button class="btn btn-outline btn-sm" onclick="window._go('main')" style="margin-bottom:8px;">← 홈으로</button>
        <div class="page-title">분기 관리</div>
        <div class="page-subtitle">분기를 생성하고 클릭하여 반을 관리하세요</div>
      </div>
    </div>
    <div class="toolbar">
      <label>연도</label>
      <select id="yearSelect" style="min-width:90px;">
        <option value="${currentYear-1}">${currentYear-1}년</option>
        <option value="${currentYear}" selected>${currentYear}년</option>
        <option value="${currentYear+1}">${currentYear+1}년</option>
      </select>
      <label>월 선택</label>
      <select id="monthSelect">
        ${months.map((m,i) => `<option value="${m}" ${i===currentMonthIdx?'selected':''}>${m}</option>`).join('')}
      </select>
      <button class="btn btn-primary" onclick="window.createQuarter()">➕ 분기생성</button>
    </div>
    <div class="box-grid">
      ${boxes}
    </div>
    ${db.quarters.length === 0 ? `<div class="empty-state"><div class="big-emoji">🗂️</div>연도와 월을 선택하고 '분기생성' 버튼을 눌러보세요</div>` : ''}
  `;
}

window.createQuarter = async function() {
  const year = document.getElementById('yearSelect').value;
  const month = document.getElementById('monthSelect').value;
  const name = `${year}년 ${month}분기`;
  if (db.quarters.find(q => q.name === name)) { showToast('⚠️ 이미 존재하는 분기입니다'); return; }
  db.quarters.push({ id: uid(), name, classes: [] });
  await saveDB();
  render();
  showToast(`✅ '${name}' 생성 완료`, 'success');
};

window.deleteQuarter = function(qid) {
  const q = getQuarter(qid);
  showConfirm(`'${q ? q.name : ''}' 분기와 모든 반/학생 데이터가 삭제됩니다.
정말 삭제할까요?`, async () => {
    db.quarters = db.quarters.filter(x => x.id !== qid);
    await saveDB();
    render();
    showToast('🗑️ 삭제되었습니다');
  });
};

/* ===========================================================
   QUARTER PAGE
=========================================================== */

function renderQuarterPage() {
  const q = getQuarter(view.quarterId);
  if (!q) return `<div class="empty-state">분기를 찾을 수 없습니다</div>`;

  const boxes = q.classes.map(c => {
    const totalMsgs = (c.messages || []).length;
    return `
    <div class="entity-box" onclick="window._go('class','${q.id}','${c.id}')">
      <button class="del-btn" onclick="event.stopPropagation(); window.deleteClass('${q.id}','${c.id}')">✕</button>
      <div class="emoji">📘</div>
      <div class="name">${c.name}</div>
      <div class="meta" style="margin-bottom:6px;">학생 ${c.students.length}명 · 발송 ${totalMsgs}건</div>
      ${c.teacher ? `<span class="teacher-badge">👩‍🏫 ${escapeHtml(c.teacher)}</span>` : `<span style="font-size:11px;color:#D1D5DB;">담임 미지정</span>`}
    </div>
  `;
  }).join('');

  return `
    <div class="page-title-row">
      <div>
        <button class="btn btn-outline btn-sm" onclick="window._go('home')" style="margin-bottom:8px;">← 분기 목록</button>
        <div class="page-title">${q.name}</div>
        <div class="page-subtitle">반을 생성하고 클릭하여 문자 입력 화면으로 이동하세요</div>
      </div>
    </div>
    <div class="toolbar" style="flex-wrap:wrap;gap:12px;align-items:center;">
      <label style="white-space:nowrap;flex-shrink:0;">반 목록</label>
      <select id="classNameSelect" style="width:160px;flex-shrink:0;">
        ${CLASS_OPTIONS.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
      </select>
      <label style="white-space:nowrap;flex-shrink:0;">전분기 학생 복사 <span style="font-weight:400;color:var(--text-secondary);font-size:11px;">(선택)</span></label>
      <select id="copyFromSelect" style="width:320px;flex-shrink:0;">
        <option value="">— 복사 안 함 —</option>
        ${(() => {
          // 현재 분기를 제외하고, 가장 최근(직전) 분기 하나만 표시
          const others = db.quarters.filter(qx => qx.id !== view.quarterId);
          if (others.length === 0) return '';
          const prevQ = others[others.length - 1]; // 배열 마지막 = 가장 최근 추가된 분기
          return prevQ.classes.map(cx =>
            `<option value="${prevQ.id}__${cx.id}">${escapeHtml(prevQ.name)} › ${escapeHtml(cx.name)} (${cx.students.filter(s=>s.name).length}명)</option>`
          ).join('');
        })()}
      </select>
      <button class="btn btn-primary" onclick="window.createClass()" style="flex-shrink:0;">➕ 반생성</button>
    </div>
    <div class="box-grid">${boxes}</div>
    ${q.classes.length === 0 ? `<div class="empty-state"><div class="big-emoji">📘</div>반을 선택하고 '반생성' 버튼을 눌러보세요</div>` : ''}
  `;
}

window.createClass = async function() {
  const name = document.getElementById('classNameSelect').value;
  const copyFrom = document.getElementById('copyFromSelect').value;
  const q = getQuarter(view.quarterId);
  const exists = q.classes.find(c => c.name === name);
  if (exists) { showToast('⚠️ 이미 생성된 반입니다'); window._go('class', q.id, exists.id); return; }

  // 전분기 학생 복사 처리
  let copiedStudents = [];
  if (copyFrom) {
    const [srcQid, srcCid] = copyFrom.split('__');
    const srcClass = getClass(srcQid, srcCid);
    if (srcClass && srcClass.students.length > 0) {
      // 이름/학교/학년만 복사, 수업1·수업2·comment는 초기화
      copiedStudents = srcClass.students.filter(s => s.name).map(s => ({
        id: uid(), name: s.name, school: s.school||'', grade: s.grade||'',
        class1: '', class2: '', comment: ''
      }));
    }
  }

  q.classes.push({
    id: uid(), name, date:'', progress:'', homework:'', teacher:'',
    students: copiedStudents, messages:[]
  });
  await saveDB();
  render();
  const msg = copiedStudents.length > 0
    ? `✅ '${name}' 생성 완료 (학생 ${copiedStudents.length}명 복사됨)`
    : `✅ '${name}' 생성 완료`;
  showToast(msg, 'success');
};

window.deleteClass = function(qid, cid) {
  const q = getQuarter(qid);
  const c = q ? q.classes.find(x => x.id === cid) : null;
  showConfirm(`'${c ? c.name : ''}' 반과 모든 학생/문자 데이터가 삭제됩니다.
정말 삭제할까요?`, async () => {
    q.classes = q.classes.filter(x => x.id !== cid);
    await saveDB();
    render();
    showToast('🗑️ 삭제되었습니다');
  });
};

/* ===========================================================
   CLASS PAGE
=========================================================== */

function renderClassPage() {
  const c = getClass(view.quarterId, view.classId);
  if (!c) return `<div class="empty-state">반을 찾을 수 없습니다</div>`;

  return `
    <div class="page-title-row">
      <div>
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;">
          <div class="page-title">${c.name}</div>
          <span class="teacher-badge" id="teacherBadge" onclick="window.editTeacher()" title="클릭하여 담임 변경" style="cursor:pointer;">
            👩‍🏫 ${c.teacher ? escapeHtml(c.teacher) : '담임 입력'}
          </span>
        </div>
        <div class="page-subtitle">공통 내용과 개별 코멘트를 입력하면 문자가 자동 생성됩니다</div>
      </div>
      <div style="display:flex;gap:8px;">

        <div id="rosterListWrap"></div>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <div class="card-header" style="justify-content:space-between;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="card-icon icon-common">📅</div>
            <div><div class="card-title">공통 내용 입력</div><div class="card-subtitle">모든 학생에게 동일하게 적용</div></div>
          </div>
          <button class="btn btn-outline btn-sm" onclick="window.resetCommonFields()">↺ 초기화</button>
        </div>
        <div class="card-body">
          <div class="field"><label>날짜</label><input type="text" id="date" placeholder="예: 6/16(화)"></div>
          <div class="field"><label>진도</label><textarea id="progress" placeholder="오늘 수업한 진도 내용을 입력하세요"></textarea></div>
          <div class="field"><label>과제</label><textarea id="homework" placeholder="이번 주 과제를 입력하세요"></textarea></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon icon-individual">✏️</div>
          <div><div class="card-title">개별 내용 입력</div><div class="card-subtitle">학생별 코멘트 작성</div></div>

        <div class="card-body">
          <div class="student-tabs" id="studentTabs"></div>

        </div>
        <div class="card-body">
          <div class="result-box" id="singleResult"><span class="result-placeholder">왼쪽에서 내용을 입력하면 자동으로 문자가 생성됩니다.</span></div>

          <div id="messageListWrap"></div>
          <div class="actions" style="margin-top:16px;">

function initClassPage() {
  const c = getClass(view.quarterId, view.classId);
  if (!c) return;
  document.getElementById('date').value = c.date || '';
  document.getElementById('progress').value = c.progress || '';
  document.getElementById('homework').value = c.homework || '';

  document.getElementById('date').oninput = onCommonInput;
  document.getElementById('progress').oninput = onCommonInput;
  document.getElementById('homework').oninput = onCommonInput;
  document.getElementById('comment').oninput = () => { onStudentInput(); countChars(); };

  if (currentStudentIdx >= c.students.length) currentStudentIdx = 0;
  renderRosterList();
  renderTabs();
  loadCurrentStudentFields();
  generateSingle();
  renderMessageList();
}

function onCommonInput() {
  const c = getClass(view.quarterId, view.classId);
  c.date = document.getElementById('date').value;
  c.progress = document.getElementById('progress').value;
  c.homework = document.getElementById('homework').value;
  saveDB();
  generateSingle();
}

function onStudentInput() {
  const c = getClass(view.quarterId, view.classId);
  if (c.students.length === 0) return;
  const s = c.students[currentStudentIdx];
  s.comment = document.getElementById('comment').value;
  saveDB();
  generateSingle();
}

window.resetCommonFields = function() {
  showConfirm('날짜 · 진도 · 과제 내용을 모두 지울까요? (학생별 코멘트는 유지됩니다)', async () => {
    const c = getClass(view.quarterId, view.classId);
    c.date = ''; c.progress = ''; c.homework = '';
    await saveDB();
    document.getElementById('date').value = '';
    document.getElementById('progress').value = '';
    document.getElementById('homework').value = '';
    generateSingle();
    showToast('↺ 공통 내용이 초기화되었습니다', 'success');
  });
};

function renderTabs() {
  const c = getClass(view.quarterId, view.classId);
  const tabs = document.getElementById('studentTabs');
  if (!tabs) return;
  if (c.students.length === 0) {
    tabs.innerHTML = `<span style="font-size:12.5px;color:var(--text-secondary);">등록된 학생이 없습니다. '학생 명단 관리'에서 학생을 추가해주세요.</span>`;
    return;
  }
  // 가나다 정렬된 인덱스로 탭 생성 (switchStudent는 원본 인덱스 기준)
  const sortedIndices = c.students
    .map((s, i) => ({ s, i }))
    .sort((a, b) => a.s.name.localeCompare(b.s.name, 'ko'))
    .map(x => x.i);

  tabs.innerHTML = sortedIndices.map(i => {
    const s = c.students[i];
    return `<button class="tab-btn ${i === currentStudentIdx ? 'active' : ''}" onclick="window.switchStudent(${i})">
      ${escapeHtml(s.name) || `학생 ${i+1}`}
    </button>`;
  }).join('');
}

window.switchStudent = function(idx) {
  currentStudentIdx = idx;
  renderTabs();
  loadCurrentStudentFields();
  generateSingle();
};

function loadCurrentStudentFields() {
  const c = getClass(view.quarterId, view.classId);
  const infoBox = document.getElementById('studentInfoBox');
  const commentEl = document.getElementById('comment');
  if (!infoBox || !commentEl) return;
  if (c.students.length === 0) {
    infoBox.innerHTML = '선택된 학생이 없습니다.';
    commentEl.value = '';
    commentEl.disabled = true;
    countChars();
    return;
  }
  commentEl.disabled = false;
  const s = c.students[currentStudentIdx];
  infoBox.innerHTML = `<b>${escapeHtml(s.name)}</b> &nbsp;|&nbsp; 🏫 ${escapeHtml(s.school)||'-'} &nbsp;|&nbsp; 🎓 ${escapeHtml(s.grade)||'-'} &nbsp;|&nbsp; 📘 ${escapeHtml(s.class1)||'-'} ${s.class2?'· '+escapeHtml(s.class2):''}`;
  commentEl.value = s.comment || '';
  countChars();
}

/* 담임명 편집 */
window.editTeacher = async function() {
  const c = getClass(view.quarterId, view.classId);
  const current = c.teacher || '';
  const name = prompt('담임 선생님 이름을 입력해주세요:', current);
  if (name === null) return; // 취소
  c.teacher = name.trim();
  await saveDB();
  // 배지만 업데이트
  const badge = document.getElementById('teacherBadge');
  if (badge) badge.innerHTML = `👩‍🏫 ${escapeHtml(c.teacher) || '담임 입력'}`;
  showToast('✅ 담임명이 저장되었습니다', 'success');
};

/* 학생 명단 */
window.toggleStudentMgmt = function() {
  studentMgmtOpen = !studentMgmtOpen;
  const card = document.getElementById('studentMgmtCard');
  if (card) card.style.display = studentMgmtOpen ? '' : 'none';
};

window.addRosterStudent = async function() {
  const c = getClass(view.quarterId, view.classId);
  const name = document.getElementById('rosterName').value.trim();
  if (!name) { showToast('⚠️ 이름을 입력해주세요'); return; }
  const school = document.getElementById('rosterSchool').value.trim();
  const grade = document.getElementById('rosterGrade').value;
  const class1 = document.getElementById('rosterClass1').value.trim();
  const class2 = document.getElementById('rosterClass2').value.trim();
  c.students.push({ id: uid(), name, school, grade, class1, class2, comment: '' });
  currentStudentIdx = c.students.length - 1;
  await saveDB();
  ['rosterName','rosterSchool','rosterClass1','rosterClass2'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('rosterGrade').value = '';
  document.getElementById('rosterName').focus();
  renderRosterList();
  renderTabs();
  loadCurrentStudentFields();
  generateSingle();
  showToast(`✅ '${name}' 추가 완료`, 'success');
};

function renderRosterList() {
  const c = getClass(view.quarterId, view.classId);
  const wrap = document.getElementById('rosterListWrap');
  if (!wrap) return;
  if (c.students.length === 0) {
    wrap.innerHTML = `<div class="empty-state" style="padding:24px 10px;"><div class="big-emoji">🧒</div>등록된 학생이 없습니다</div>`;
    return;
  }
  // 가나다 정렬된 인덱스 배열 생성 (원본 배열 순서는 유지)
  const sortedIndices = c.students
    .map((s, i) => ({ s, i }))
    .sort((a, b) => a.s.name.localeCompare(b.s.name, 'ko'))
    .map(x => x.i);

  wrap.innerHTML = `
    <table class="roster-table">
      <thead><tr><th>이름</th><th>학교</th><th>학년</th><th>수업1</th><th>수업2</th><th></th></tr></thead>
      <tbody>
        ${sortedIndices.map(i => {
          const s = c.students[i];
          return `
          <tr class="${i===currentStudentIdx?'selected-row':''}" id="roster-row-${i}">
            <td><b>${escapeHtml(s.name)}</b></td>
            <td id="roster-cell-school-${i}">${escapeHtml(s.school)||'-'}</td>
            <td id="roster-cell-grade-${i}">${escapeHtml(s.grade)||'-'}</td>
            <td id="roster-cell-class1-${i}">${escapeHtml(s.class1)||'-'}</td>
            <td id="roster-cell-class2-${i}">${escapeHtml(s.class2)||'-'}</td>
            <td style="white-space:nowrap;text-align:right;">
              <button class="btn btn-outline btn-sm" onclick="window.switchStudent(${i})">선택</button>
              <button class="btn btn-outline btn-sm" style="color:var(--primary);border-color:var(--primary);" onclick="window.editRosterStudent(${i})">수정</button>
              <button class="btn btn-danger btn-sm" onclick="window.removeRosterStudent(${i})">삭제</button>
            </td>
          </tr>
        `}).join('')}
      </tbody>
    </table>
  `;
}

window.editRosterStudent = function(idx) {
  const c = getClass(view.quarterId, view.classId);
  const s = c.students[idx];

  // 이미 편집 중이면 닫기
  const existingEdit = document.getElementById('roster-edit-row');
  if (existingEdit) existingEdit.remove();

  const row = document.getElementById(`roster-row-${idx}`);
  if (!row) return;

  const editRow = document.createElement('tr');
  editRow.id = 'roster-edit-row';
  editRow.style.background = '#FFFDE7';
  editRow.innerHTML = `
    <td><b>${escapeHtml(s.name)}</b></td>
    <td><input type="text" id="edit-school" value="${escapeHtml(s.school||'')}" placeholder="학교" style="width:100%;border:1.5px solid var(--primary);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;"></td>
    <td>
      <select id="edit-grade" style="width:100%;border:1.5px solid var(--primary);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;">
        <option value="">학년 선택</option>
        <option value="초1" ${s.grade==='초1'?'selected':''}>초1</option>
        <option value="초2" ${s.grade==='초2'?'selected':''}>초2</option>
        <option value="초3" ${s.grade==='초3'?'selected':''}>초3</option>
        <option value="초4" ${s.grade==='초4'?'selected':''}>초4</option>
      </select>
    </td>
    <td><input type="text" id="edit-class1" value="${escapeHtml(s.class1||'')}" placeholder="수업1" style="width:100%;border:1.5px solid var(--primary);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;"></td>
    <td><input type="text" id="edit-class2" value="${escapeHtml(s.class2||'')}" placeholder="수업2" style="width:100%;border:1.5px solid var(--primary);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;"></td>
    <td style="white-space:nowrap;text-align:right;">
      <button class="btn btn-primary btn-sm" onclick="window.saveRosterEdit(${idx})">저장</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('roster-edit-row').remove()">취소</button>
    </td>
  `;

  // 해당 row 다음에 편집 row 삽입
  row.insertAdjacentElement('afterend', editRow);
  document.getElementById('edit-school').focus();
};

window.saveRosterEdit = async function(idx) {
  const c = getClass(view.quarterId, view.classId);
  const s = c.students[idx];
  s.school = document.getElementById('edit-school').value.trim();
  s.grade  = document.getElementById('edit-grade').value;
  s.class1 = document.getElementById('edit-class1').value.trim();
  s.class2 = document.getElementById('edit-class2').value.trim();
  await saveDB();
  renderRosterList();
  loadCurrentStudentFields();
  showToast('✅ 수정되었습니다', 'success');
};

window.removeRosterStudent = function(idx) {
  const c = getClass(view.quarterId, view.classId);
  const s = c.students[idx];
  showConfirm(`'${s.name}' 학생을 명단에서 삭제할까요?\n(저장된 발송 내역은 유지됩니다)`, async () => {
    c.students.splice(idx, 1);
    if (currentStudentIdx >= c.students.length) currentStudentIdx = Math.max(0, c.students.length-1);
    await saveDB();
    renderRosterList(); renderTabs(); loadCurrentStudentFields(); generateSingle();
    showToast('🗑️ 삭제되었습니다');
  });
};

/* 문자 생성 */
function buildMessage(date, progress, homework, studentName, comment) {
  const name = studentName || '학생';
  let msg = '';
  if (date) msg += `${date} 진도 및 과제 안내

`;
  if (progress) msg += `■ 진도
${progress}
`;
  if (homework) msg += `■ 과제
${homework}
`;
  if (progress || homework) msg += `
`;
  msg += `오늘 ${name}학생의 Bloomath는? 
`;
  if (comment) msg += comment;
  return msg.trim();
}

function generateSingle() {
  const c = getClass(view.quarterId, view.classId);
  const box = document.getElementById('singleResult');
  if (!box) return;
  if (c.students.length === 0) {
    box.innerHTML = '<span class="result-placeholder">학생 명단을 먼저 추가해주세요.</span>';
    return;
  }
  const s = c.students[currentStudentIdx];
  const msg = buildMessage(c.date, c.progress, c.homework, s.name, s.comment);
  if (!c.date && !c.progress && !c.homework && !s.name && !s.comment) {
    box.innerHTML = '<span class="result-placeholder">왼쪽에서 내용을 입력하면 자동으로 문자가 생성됩니다.</span>';
  } else {
    box.textContent = msg;
    box.classList.remove('updated'); void box.offsetWidth; box.classList.add('updated');
  }
}

function countChars() {
  const v = document.getElementById('comment')?.value || '';
  const el = document.getElementById('charCount');
  if (!el) return;
  el.textContent = `${v.length}자`;
  el.className = 'char-count' + (v.length > 300 ? ' over' : '');
}

window.copySingle = function() {
  const c = getClass(view.quarterId, view.classId);
  if (c.students.length === 0) { showToast('⚠️ 학생 명단을 먼저 추가해주세요'); return; }
  const s = c.students[currentStudentIdx];
  const msg = buildMessage(c.date, c.progress, c.homework, s.name, s.comment);
  navigator.clipboard.writeText(msg).then(() => showToast('✅ 복사되었습니다!', 'success'));
};

window.saveCurrentMessage = async function() {
  const c = getClass(view.quarterId, view.classId);
  if (c.students.length === 0) { showToast('⚠️ 학생 명단을 먼저 추가해주세요'); return; }
  const s = c.students[currentStudentIdx];
  const msg = buildMessage(c.date, c.progress, c.homework, s.name, s.comment);
  if (!c.date || !s.name) { showToast('⚠️ 날짜와 학생 이름을 입력해주세요'); return; }
  if (!c.messages) c.messages = [];
  const existing = c.messages.find(m => m.date === c.date && m.studentId === s.id);
  const entry = { id: existing?existing.id:uid(), date:c.date, progress:c.progress, homework:c.homework, studentId:s.id, studentName:s.name, comment:s.comment, text:msg, createdAt:existing?existing.createdAt:Date.now() };
  if (existing) Object.assign(existing, entry); else c.messages.push(entry);
  await saveDB();
  renderMessageList();
  showToast('💾 발송목록에 저장되었습니다', 'success');
};

function renderMessageList() {
  const c = getClass(view.quarterId, view.classId);
  const wrap = document.getElementById('messageListWrap');
  if (!wrap) return;
  const msgs = (c.messages||[]).slice().sort((a,b) => b.createdAt - a.createdAt);
  if (msgs.length === 0) {
    wrap.innerHTML = `<div class="empty-state" style="padding:30px 10px;"><div class="big-emoji">📭</div>'발송목록에 저장' 버튼을 눌러 문자를 기록하세요</div>`;
    return;
  }
  wrap.innerHTML = `
    <table class="msg-table">
      <thead><tr><th class="col-date">날짜</th><th class="col-name">학생이름</th><th>전체</th><th></th></tr></thead>
      <tbody>
        ${msgs.map(m => `
          <tr class="clickable" onclick="window.viewSavedMessage('${m.id}')">
            <td class="col-date">${escapeHtml(m.date)}</td>
            <td class="col-name">${escapeHtml(m.studentName)}</td>
            <td class="col-full">${escapeHtml(m.text.replace(/\n/g,' '))}</td>
            <td style="text-align:right;width:1%;white-space:nowrap;">
              <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();window.copySavedMessage('${m.id}')">복사</button>
              <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();window.deleteSavedMessage('${m.id}')">삭제</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

window.viewSavedMessage = function(mid) {
  const c = getClass(view.quarterId, view.classId);
  const m = c.messages.find(x => x.id === mid);
  if (!m) return;
  document.getElementById('modalTitle').textContent = `${m.date} · ${m.studentName}`;
  document.getElementById('modalContent').innerHTML = `<pre style="white-space:pre-wrap;word-break:break-all;font-family:'Noto Sans KR',sans-serif;font-size:13.5px;line-height:1.75;background:var(--surface2);padding:16px;border-radius:8px;">${escapeHtml(m.text)}</pre>`;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-primary" onclick="window.copySavedMessage('${m.id}')">📋 복사</button>
    <button class="btn btn-outline" onclick="window.closeModal()">닫기</button>
  `;
  document.getElementById('modal').style.display = 'block';
};

window.copySavedMessage = function(mid) {
  const c = getClass(view.quarterId, view.classId);
  const m = c.messages.find(x => x.id === mid);
  if (!m) return;
  navigator.clipboard.writeText(m.text).then(() => showToast('✅ 복사되었습니다!', 'success'));
};

window.deleteSavedMessage = function(mid) {
  const c = getClass(view.quarterId, view.classId);
  const m = c.messages.find(x => x.id === mid);

window.saveAllCurrent = async function() {

  if (!c.date) { showToast('⚠️ 날짜를 입력해주세요'); return; }
  if (!c.messages) c.messages = [];
  let count = 0;
  c.students.forEach(s => {
    if (!s.name) return;
    const msg = buildMessage(c.date, c.progress, c.homework, s.name, s.comment);
    const existing = c.messages.find(m => m.date === c.date && m.studentId === s.id);
    const entry = { id:existing?existing.id:uid(), date:c.date, progress:c.progress, homework:c.homework, studentId:s.id, studentName:s.name, comment:s.comment, text:msg, createdAt:existing?existing.createdAt:Date.now() };

    count++;
  });

  renderMessageList();
  window.closeModal();
  showToast(`💾 ${count}명 저장 완료`, 'success');
};

function renderStats() {
  const content = document.getElementById('statsContent');
  let totalClasses=0, totalStudents=0, totalMessages=0;
  db.quarters.forEach(q => {
    totalClasses += q.classes.length;
    q.classes.forEach(c => { totalStudents += c.students.filter(s=>s.name).length; totalMessages += (c.messages||[]).length; });
  });
  let html = `
    <div class="stat-summary">
      <div class="stat-card"><div class="num">${db.quarters.length}</div><div class="lbl">전체 분기</div></div>
      <div class="stat-card"><div class="num">${totalClasses}</div><div class="lbl">전체 반</div></div>
      <div class="stat-card"><div class="num">${totalStudents}</div><div class="lbl">전체 학생</div></div>
      <div class="stat-card"><div class="num">${totalMessages}</div><div class="lbl">전체 발송 문자</div></div>
    </div>
  `;
  if (db.quarters.length === 0) { html += `<div class="empty-state"><div class="big-emoji">📊</div>아직 데이터가 없습니다</div>`; content.innerHTML = html; return; }

  // 최신 분기가 위로
  const sortedQuarters = [...db.quarters].reverse();

  sortedQuarters.forEach(q => {
    const qMsgCount = q.classes.reduce((s,c)=>s+(c.messages||[]).length,0);
    html += `<div class="stat-section">
      <div class="stat-section-header">🗂️ ${escapeHtml(q.name)} <span class="count">· 발송 ${qMsgCount}건</span></div>
      <div class="stat-section-body">`;

    if (q.classes.length === 0) {
      html += `<div class="stat-row"><span class="sub-text">등록된 반이 없습니다</span></div>`;
    } else {
      q.classes.forEach(c => {
        const msgs = c.messages || [];
        const totalClassMsgs = msgs.length;

        // 학생별로 발송 내역 묶기
        const studentMap = {};
        c.students.forEach(s => { if (s.name) studentMap[s.id] = { name: s.name, msgs: [] }; });
        msgs.forEach(m => {
          if (studentMap[m.studentId]) {
            studentMap[m.studentId].msgs.push(m);
          } else {
            // studentId 없는 경우 이름으로 매핑
            const found = Object.values(studentMap).find(x => x.name === m.studentName);
            if (found) found.msgs.push(m);
            else {
              if (!studentMap['_'+m.studentName]) studentMap['_'+m.studentName] = { name: m.studentName, msgs: [] };
              studentMap['_'+m.studentName].msgs.push(m);
            }
          }
        });

        const studentList = Object.values(studentMap).filter(x => x.name);

        html += `
          <div class="stat-row" onclick="window.toggleClassStats('${q.id}_${c.id}')" style="border-bottom:1.5px solid var(--border);">
            <div class="left">
              <span class="badge">📘 ${escapeHtml(c.name)}</span>
              ${c.teacher ? `<span class="teacher-badge" style="margin-left:4px;">👩‍🏫 ${escapeHtml(c.teacher)}</span>` : ''}
              <span class="sub-text">학생 ${studentList.length}명</span>
            </div>
            <span class="count">${totalClassMsgs}건 ▾</span>
          </div>
          <div id="classstats_${q.id}_${c.id}" style="display:none;">
        `;

        if (studentList.length === 0) {
          html += `<div style="padding:12px 20px;color:var(--text-secondary);font-size:13px;">저장된 발송 내역이 없습니다</div>`;
        } else {
          html += `<table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead>
              <tr style="background:var(--surface2);">
                <th style="padding:9px 16px;text-align:center;width:60px;font-size:11.5px;color:var(--text-secondary);letter-spacing:0.03em;border-bottom:1px solid var(--border);">발송수</th>
                <th style="padding:9px 12px;text-align:left;width:90px;font-size:11.5px;color:var(--text-secondary);letter-spacing:0.03em;border-bottom:1px solid var(--border);">학생</th>
                <th style="padding:9px 12px;text-align:left;font-size:11.5px;color:var(--text-secondary);letter-spacing:0.03em;border-bottom:1px solid var(--border);">발송 날짜</th>
              </tr>
            </thead>
            <tbody>`;

          studentList.forEach(stu => {
            const stuMsgs = stu.msgs.slice().sort((a,b) => {
              // 날짜 파싱: "3/4(수)", "6/22(월)", "3/5 목요일" 등 다양한 형식 처리
              const parseDate = d => {
                const m = (d||'').match(/(\d{1,2})[\/\.](\d{1,2})/);
                return m ? parseInt(m[1])*100 + parseInt(m[2]) : 0;
              };
              return parseDate(a.date) - parseDate(b.date);
            });
            const count = stuMsgs.length;
            html += `
              <tr style="border-bottom:1px solid var(--border);vertical-align:middle;">
                <td style="padding:10px 16px;text-align:center;">
                  <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:${count>0?'var(--primary)':'var(--border)'};color:${count>0?'#fff':'var(--text-secondary)'};font-size:12px;font-weight:700;">${count}</span>
                </td>
                <td style="padding:10px 12px;font-weight:700;white-space:nowrap;">${escapeHtml(stu.name)}</td>
                <td style="padding:10px 12px;">
                  <div style="display:flex;flex-wrap:wrap;gap:5px;">
                    ${stuMsgs.length === 0
                      ? `<span style="color:var(--text-secondary);font-size:12px;">발송 내역 없음</span>`
                      : stuMsgs.map(m => `
                          <span
                            onclick="window.viewStatsMessage('${q.id}','${c.id}','${m.id}')"
                            style="display:inline-flex;align-items:center;background:var(--success-light);color:var(--success);border:1px solid #A7F3D0;padding:3px 9px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;"
                            onmouseover="this.style.background='var(--success)';this.style.color='#fff';"
                            onmouseout="this.style.background='var(--success-light)';this.style.color='var(--success)';"
                          >${escapeHtml(m.date)}</span>
                        `).join('')
                    }
                  </div>
                </td>
              </tr>`;
          });

          html += `</tbody></table>`;
        }

        html += `</div>`;
      });
    }
    html += `</div></div>`;
  });

  content.innerHTML = html;
}

}

/* ===========================================================
   PL 개별진도반 - 데이터 모델 (분기 구조)
   pl_db = {
     terms: [ { id, name, venue, classes:[{id,name,day,time,teacher}] } ],
     classes: { classId: { students, sessions, sendHistory, currentDate } },
     students: { studentId: { name, school, grade, course, period, endMonth, memo, sentLog } }
   }
=========================================================== */

const PL_STORAGE_KEY = 'bloomath_pl_v1';
let pl_db = { terms: [], classes: {}, students: {} };
let plView = { termId: null, classId: null, studentId: null };
let isPLSaving = false;
let isPLInitialized = false;

function loadPLDB() { return { terms: [], classes: {}, students: {} }; }

async function savePLDB() {
  isPLSaving = true;
  try {
    await setDoc(PL_DOC, { terms: pl_db.terms, classes: pl_db.classes, students: pl_db.students });
    flashSaveIndicator('saved');
  } catch(e) {
    console.error('PL 저장 오류:', e);
    flashSaveIndicator('error');
  }
  setTimeout(() => { isPLSaving = false; }, 800);
}

function startPLRealtimeSync() {
  onSnapshot(PL_DOC, (snap) => {
    if (isPLSaving) return;
    if (snap.exists()) {
      const r = snap.data();
      pl_db = { terms: r.terms||[], classes: r.classes||{}, students: r.students||{} };
    } else {
      pl_db = { terms: [], classes: {}, students: {} };
      setDoc(PL_DOC, { terms:[], classes:{}, students:{} }).catch(e=>console.error(e));
    }
    if (!isPLInitialized) { isPLInitialized = true; }
    else if (view.page && view.page.startsWith('pl')) { silentPLRefresh(); }
  }, (err) => { console.error('PL 동기화 오류:', err); isPLInitialized = true; });
}

function silentPLRefresh() {
  const app = document.getElementById('app');
  if (!app) return;
  if (view.page === 'pl-home') { app.innerHTML = renderPLHome(); showSyncBadge(); }
  else if (view.page === 'pl-terms') { app.innerHTML = renderPLTerms(); showSyncBadge(); }
  else if (view.page === 'pl-class') { const t=document.getElementById('plStudentTabs'); if(t){renderPLStudentTabs();showSyncBadge();} }
  else if (view.page === 'pl-roster') { app.innerHTML = renderPLRoster(); showSyncBadge(); }
}

function getPLTerm(tid) { return pl_db.terms.find(t=>t.id===tid); }
function getPLClassDef(termId, classId) { const t=getPLTerm(termId); return t?t.classes.find(c=>c.id===classId):null; }
function getPLClassData(classId) {
  if (!pl_db.classes[classId]) pl_db.classes[classId]={students:[],sessions:[],sendHistory:[],currentDate:''};
  return pl_db.classes[classId];
}
function getPLClass(venue, classId) {
  for(const t of pl_db.terms){ const c=t.classes.find(x=>x.id===classId); if(c) return c; }
  return null;
}
function sortClassesByTime(classes) {
  return [...classes].sort((a,b)=>{
    const m=t=>{const r=(t||'').match(/(\d+):(\d+)/);return r?parseInt(r[1])*60+parseInt(r[2]):999;};
    return m(a.time)-m(b.time);
  });
}

window.createPLTerm = async function() {
  const yr=document.getElementById('plYearSel').value;

  const name=`${yr}년 ${mo}분기 (${venue})`;

  const defaultClasses = (PL_DEFAULT_CLASSES[venue]||[]).map(c => ({

  pl_db.terms.push({id:uid(), name, venue, classes: defaultClasses});
  await savePLDB(); render(); showToast(`✅ '${name}' 생성 완료 (기본 반 ${defaultClasses.length}개 자동 추가)`,'success');

  const days=[...new Set(sorted.map(c=>c.day))].sort((a,b)=>dayOrder.indexOf(a)-dayOrder.indexOf(b));
  const prevTerm=pl_db.terms.filter(t=>t.id!==termId).slice(-1)[0]||null;
  return `
    <div class="page-title-row">
      <div>
        <button class="btn btn-outline btn-sm" onclick="window.plGo('home')" style="margin-bottom:8px;">← 분기 목록</button>

      <label>요일</label>

      <button class="btn btn-pl btn-sm" onclick="window.addPLClass('${termId}')">➕ 반추가</button>
      ${prevTerm?`
        <div style="border-left:1px solid var(--border);padding-left:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <label style="white-space:nowrap;">전분기 명단 복사</label>
          <select id="plCopyFrom" style="width:170px;">
            <option value="">— 원본 반 선택 —</option>
            ${sortClassesByTime(prevTerm.classes).map(c=>`<option value="${c.id}">${prevTerm.name} › ${c.name}</option>`).join('')}
          </select>
          <select id="plCopyTo" style="width:120px;">
            <option value="">→ 대상 반</option>
            ${sorted.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
          </select>
          <button class="btn btn-pl-outline btn-sm" onclick="window.copyPLStudents()">복사</button>
        </div>`:``}
    </div>
    ${days.map(day=>{
      const dc=sorted.filter(c=>c.day===day);
      return `<div style="margin-bottom:20px;">
        <div style="font-size:12px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">${day}요일</div>
        <div class="pl-class-grid">
          ${dc.map(cls=>{
            const cnt=pl_db.classes[cls.id]?.students?.length||0;
            return `<div class="entity-box" style="cursor:pointer;" onclick="window.plGo('class','${termId}','${cls.id}')">

              <button class="btn btn-outline btn-sm" style="margin-top:8px;font-size:11px;padding:3px 8px;" onclick="event.stopPropagation();window.editPLClass('${termId}','${cls.id}')">✏️ 수정</button>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
    ${days.length===0?`<div class="empty-state"><div class="big-emoji">📘</div>위 폼에서 반을 추가해주세요</div>`:''}`;
}

window.addPLClass=async function(termId){
  const name=document.getElementById('plNewClassName').value.trim();
  const day=document.getElementById('plNewClassDay').value;
  const time=document.getElementById('plNewClassTime').value.trim();
  if(!name){showToast('⚠️ 반 이름을 입력해주세요');return;}
  getPLTerm(termId).classes.push({id:uid(),name,day,time,teacher:''});
  await savePLDB(); document.getElementById('plNewClassName').value=''; document.getElementById('plNewClassTime').value='';
  view={page:'pl-terms',plTermId:termId}; render(); showToast(`✅ '${name}' 반 추가`,'success');
};
window.deletePLClass=function(termId,classId){
  const t=getPLTerm(termId); const c=t?.classes.find(x=>x.id===classId);
  showConfirm(`'${c?.name}' 반을 삭제할까요?`,async()=>{
    t.classes=t.classes.filter(x=>x.id!==classId);
    await savePLDB(); view={page:'pl-terms',plTermId:termId}; render(); showToast('🗑️ 삭제됨');
  });
};
window.editPLClass=function(termId,classId){
  const t=getPLTerm(termId); const cls=t?.classes.find(c=>c.id===classId); if(!cls) return;
  document.getElementById('modalTitle').textContent='반 정보 수정';
  document.getElementById('modalContent').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div><label>반 이름</label><input type="text" id="eCN" value="${escapeHtml(cls.name)}" style="width:100%;"></div>
      <div><label>요일</label><select id="eCD" style="width:100%;">${['월','화','수','목','금','토','일'].map(d=>`<option ${cls.day===d?'selected':''}>${d}</option>`).join('')}</select></div>
      <div><label>시간</label><input type="text" id="eCT" value="${escapeHtml(cls.time)}" style="width:100%;"></div>
      <div><label>담임</label><input type="text" id="eTch" value="${escapeHtml(cls.teacher||'')}" style="width:100%;"></div>
    </div>`;
  document.getElementById('modalFooter').innerHTML=`
    <button class="btn btn-primary" onclick="window.saveEditPLClass('${termId}','${classId}')">💾 저장</button>
    <button class="btn btn-outline" onclick="window.closeModal()">취소</button>`;
  document.getElementById('modal').style.display='block';
};
window.saveEditPLClass=async function(termId,classId){
  const t=getPLTerm(termId); const cls=t?.classes.find(c=>c.id===classId); if(!cls) return;
  cls.name=document.getElementById('eCN').value.trim();
  cls.day=document.getElementById('eCD').value;
  cls.time=document.getElementById('eCT').value.trim();
  cls.teacher=document.getElementById('eTch').value.trim();
  await savePLDB(); window.closeModal(); view={page:'pl-terms',plTermId:termId}; render(); showToast('✅ 저장됨','success');
};
window.copyPLStudents=async function(){
  const fromId=document.getElementById('plCopyFrom').value;
  const toId=document.getElementById('plCopyTo').value;
  if(!fromId||!toId){showToast('⚠️ 원본 반과 대상 반을 선택해주세요');return;}
  const fromData=getPLClassData(fromId); const toData=getPLClassData(toId);
  const existNames=new Set(toData.students.map(s=>s.name));
  const news=fromData.students.filter(s=>s.name&&!existNames.has(s.name)).map(s=>{
    const orig=pl_db.students[s.id]||{};
    const nid='pl_'+uid();
    pl_db.students[nid]={name:s.name,school:orig.school||'',grade:orig.grade||'',course:'',period:'',endMonth:'',memo:'',sentLog:{}};
    return {id:nid,name:s.name};
  });
  toData.students.push(...news);
  await savePLDB(); render(); showToast(`✅ ${news.length}명 복사 완료`,'success');
};

function renderPLStudentTabs() {
  const classId=view.plClassId; const data=getPLClassData(classId);
  const tabs=document.getElementById('plStudentTabs'); if(!tabs)return;
  if(data.students.length===0){
    tabs.innerHTML=`<span style="font-size:12.5px;color:var(--text-secondary);">학생을 추가해주세요</span>`;
    return;
  }
  const sorted=data.students.slice().sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  tabs.innerHTML=sorted.map(s=>{
    const isSent=pl_db.students[s.id]?.sentLog?.[classId+'_'+(data.currentDate||'')]||false;
    return `<button class="tab-btn ${s.id===plView.studentId?'active':''}" onclick="window.selectPLStudent('${s.id}')"
      style="${isSent?'border-color:#10B981;color:#10B981;':''}">

}

// YYYY-MM-DD → M/D(요일) 변환
function formatPLDate(val) {
  if (!val) return '';
  // 이미 변환된 형식이면 그대로
  if (!/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  const days = ['일','월','화','수','목','금','토'];
  const d = new Date(val + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
}

window.updatePLPreview=function(sid){
  if(!sid) return;
  const stu=pl_db.students[sid]; if(!stu)return;
  const g=id=>document.getElementById(id)?.value||'';

    g('plCourse_'+sid) || stu.course,
    stu.name,
    formatPLDate(g('plDate_'+sid)),
    g('plSess_'+sid),
    g('plLC_'+sid),
    g('plHW_'+sid),
    g('plTestScore_'+sid),
    g('plTestMax_'+sid),
    g('plCmt_'+sid)
  );

  if(p) p.textContent=msg;
};

function buildPLMsg(course, name, date, sn, lc, hw, testScore, testMax, cmt) {
  const n = name || '학생';
  const cr = course || '';
  let m = '';
  if (date) m += `${date}\n`;
  m += `${n}학생의 ${cr} ${sn ? sn+'회차' : ''} 수업안내\n\n`;
  if (lc) m += `L-Class진도\n${lc}\n\n`;
  if (hw) m += `가정학습 과제\n${hw}\n\n`;
  if (testScore) m += `일일TEST: ${testScore}점${testMax ? ` / ${testMax}점 만점` : ''}\n\n`;
  if (cmt) m += cmt;
  return m.trim();
}

function getPLCurrentMsg(sid) {
  const stu=pl_db.students[sid]; if(!stu) return '';
  const g=id=>document.getElementById(id)?.value||'';
  return buildPLMsg(
    g('plCourse_'+sid) || stu.course,
    stu.name,
    formatPLDate(g('plDate_'+sid)),
    g('plSess_'+sid),
    g('plLC_'+sid),
    g('plHW_'+sid),
    g('plTestScore_'+sid),
    g('plTestMax_'+sid),
    g('plCmt_'+sid)
  );
}

          }).join('') || '<span style="color:var(--text-secondary);font-size:12px;">없음</span>'}
        </div>
        <label style="font-size:12px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:4px;">반 추가</label>
        <div style="display:flex;gap:6px;">
          <select id="eAddClass" style="flex:1;font-size:12px;">
            <option value="">— 반 선택 —</option>
            ${allTermClasses.filter(({cls})=>!myClassIds.has(cls.id)).map(({termId,termName,cls})=>
              `<option value="${cls.id}">${escapeHtml(termName)} › ${escapeHtml(cls.name)}</option>`
            ).join('')}
          </select>
          <button class="btn btn-pl btn-sm" onclick="window.addStuToClass('${sid}')">추가</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modalFooter').innerHTML=`
    <button class="btn btn-primary" onclick="window.savePLStu('${sid}')">💾 저장</button>
    <button class="btn btn-outline" onclick="window.closeModal()">취소</button>`;
  document.getElementById('modal').style.display='block';
};

window.addStuToClass = async function(sid) {
  const classId = document.getElementById('eAddClass').value;
  if (!classId) { showToast('⚠️ 반을 선택해주세요'); return; }
  const data = getPLClassData(classId);
  if (data.students.some(s => s.id === sid)) { showToast('⚠️ 이미 수강 중인 반입니다'); return; }
  const stu = pl_db.students[sid];
  data.students.push({ id: sid, name: stu.name });
  await savePLDB();
  showToast('✅ 반 추가 완료', 'success');
  window.editPLStu(sid); // 모달 새로고침
};

window.removeStuFromClass = async function(sid, classId) {
  const cls = pl_db.terms.flatMap(t=>t.classes).find(c=>c.id===classId);
  showConfirm(`'${cls?.name}' 반에서 삭제할까요?`, async () => {
    const data = getPLClassData(classId);
    data.students = data.students.filter(s => s.id !== sid);
    await savePLDB();
    showToast('🗑️ 반에서 삭제됨');
    window.editPLStu(sid); // 모달 새로고침
  });
};
window.savePLStu=async function(sid){
  const stu=pl_db.students[sid];
  stu.school=document.getElementById('eSch').value.trim();
  stu.grade=document.getElementById('eGrd').value;
  stu.course=document.getElementById('eCrs').value.trim();
  stu.period=document.getElementById('ePrd').value.trim();
  stu.endMonth=document.getElementById('eEnd').value.trim();
  stu.memo=document.getElementById('eMemo').value.trim();
  await savePLDB(); window.closeModal(); render(); showToast('✅ 저장되었습니다','success');
};

/* ===========================================================
   INIT
=========================================================== */
startRealtimeSync();
startPLRealtimeSync();

// 안전장치: 5초 후에도 로딩 중이면 강제로 홈 화면 표시
setTimeout(() => {
  if (!isInitialized) {
    console.warn('Firebase 연결 지연 — 강제 진입');
    db = { quarters: [] };
    pl_db = { classes: {}, students: {} };
    isInitialized = true;
    isPLInitialized = true;
    hideLoading();
    view = { page: 'main' };
    render();
    showToast('⚠️ 연결이 지연되고 있습니다. 새로고침을 시도해주세요.');
  }
}, 5000);
</script>
</body>
